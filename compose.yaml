services: 

  # --- フロントエンド (React) ---
  frontend:
    container_name: frontend
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - HOST=0.0.0.0 
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true
